server {
    listen 80;

    # 1. Serve static Vite React files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Prevents 404 errors when refreshing React Router pages
    }

    # 2. Forward API requests to your Express Backend container
    location /api/ {
        # 'backend' is the service name defined in your docker-compose.yml file
        proxy_pass http://backend:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
