services:
  # This injects the MySQL service into your stack locally
  mysql-db:
    image: mysql:8.4
    container_name: local-mysql
    restart: always
    # Use port 3309 because 3306 is being used by another service (MySQL server)
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: test_db
    # Saves your data safely on your laptop
    volumes:
      - /var/lib/mysql

  # This updates the backend service to wait for the database
  backend:
    depends_on:
      - mysql